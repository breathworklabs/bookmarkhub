name: Deploy to Production

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build for production
        run: npm run build
        env:
          VITE_APP_ENV: production
          # Add your production environment variables here
          # VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}

      - name: Deploy to Vercel (if configured)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          echo "Deployment ready - configure Vercel integration in GitHub"
          echo "Or install Vercel CLI and add VERCEL_TOKEN secret"
          # Uncomment and configure when ready:
          # npm install -g vercel
          # vercel --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Alternative: Deploy to Netlify
      # - name: Deploy to Netlify
      #   uses: nwtgck/actions-netlify@v3.0
      #   with:
      #     publish-dir: './dist'
      #     production-deploy: true
      #   env:
      #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      #     NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deployment Summary
        run: |
          echo "✅ Build completed successfully"
          echo "📦 Build artifacts ready in dist/"
          echo "🚀 Configure deployment platform (Vercel/Netlify) to complete setup"
