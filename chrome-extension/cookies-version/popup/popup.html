<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookmarkHub</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-container">
      <!-- Header with Gradient Brand -->
      <div class="header">
        <div class="logo-wrapper">
          <img
            src="../assets/icons/icon48.png"
            alt="BookmarkHub Logo"
            class="logo-img"
          />
          <div class="brand-info">
            <h1>BookmarkHub</h1>
            <span class="subtitle">X Bookmark Manager</span>
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Requirements Info -->
        <div id="requirements-info" class="info-card">
          <div class="info-icon">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="16" x2="12" y2="12" />
              <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
          </div>
          <div class="info-content">
            <div class="info-title">Checking...</div>
            <div class="info-text">
              Verifying your X/Twitter login status...
            </div>
          </div>
        </div>

        <!-- Progress Bar (shown during extraction) -->
        <div
          id="progress-section"
          class="progress-section"
          style="display: none"
        >
          <div class="progress-label">
            <span id="progress-text">Extracting bookmarks...</span>
          </div>
          <div id="progress-bar" class="progress-bar">
            <div class="progress-fill"></div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="buttons-section">
          <button id="extract-bookmarks" class="btn btn-primary">
            <svg
              class="btn-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
            </svg>
            <span class="btn-text">Extract Bookmarks</span>
          </button>

          <button id="open-manager" class="btn btn-secondary">
            <svg
              class="btn-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
              <line x1="9" y1="3" x2="9" y2="21" />
            </svg>
            <span class="btn-text">Open Manager</span>
          </button>

          <button id="test-connection" class="btn btn-tertiary">
            <svg
              class="btn-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
            <span class="btn-text">Test Connection</span>
          </button>
        </div>

        <!-- Debug Info -->
        <div id="debug-info" class="debug-section" style="display: none">
          <div class="debug-header">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="2" y="6" width="20" height="12" rx="2" />
              <path d="M6 12h.01M10 12h.01M14 12h.01M18 12h.01" />
            </svg>
            <span class="debug-title">Debug Information</span>
          </div>
          <div id="debug-content" class="debug-content"></div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <div class="footer-text">
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
            <line x1="12" y1="2" x2="12" y2="12"></line>
          </svg>
          <span>Powered by BookmarkHub</span>
        </div>
      </div>
    </div>

    <script src="../config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
