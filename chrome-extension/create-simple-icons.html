<!DOCTYPE html>
<html>
<head>
    <title>Create Extension Icons</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; margin: 10px; }
        .icon-group { display: inline-block; text-align: center; margin: 20px; }
        button { margin: 5px; padding: 10px; }
    </style>
</head>
<body>
    <h1>BookmarkX Extension Icons</h1>
    <p>Click "Download" buttons to save the icons:</p>
    
    <div class="icon-group">
        <canvas id="icon16" width="16" height="16"></canvas>
        <div>icon16.png</div>
        <button onclick="downloadIcon('icon16', 'icon16.png')">Download</button>
    </div>
    
    <div class="icon-group">
        <canvas id="icon32" width="32" height="32"></canvas>
        <div>icon32.png</div>
        <button onclick="downloadIcon('icon32', 'icon32.png')">Download</button>
    </div>
    
    <div class="icon-group">
        <canvas id="icon48" width="48" height="48"></canvas>
        <div>icon48.png</div>
        <button onclick="downloadIcon('icon48', 'icon48.png')">Download</button>
    </div>
    
    <div class="icon-group">
        <canvas id="icon128" width="128" height="128"></canvas>
        <div>icon128.png</div>
        <button onclick="downloadIcon('icon128', 'icon128.png')">Download</button>
    </div>

    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, size, size);
            
            // Background circle
            ctx.fillStyle = '#1da1f2';
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2 - 1, 0, 2 * Math.PI);
            ctx.fill();
            
            // Bookmark icon
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(size * 0.3, size * 0.25);
            ctx.lineTo(size * 0.7, size * 0.25);
            ctx.lineTo(size * 0.7, size * 0.75);
            ctx.lineTo(size * 0.5, size * 0.65);
            ctx.lineTo(size * 0.3, size * 0.75);
            ctx.closePath();
            ctx.fill();
        }
        
        function downloadIcon(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        // Draw all icons
        drawIcon(document.getElementById('icon16'), 16);
        drawIcon(document.getElementById('icon32'), 32);
        drawIcon(document.getElementById('icon48'), 48);
        drawIcon(document.getElementById('icon128'), 128);
    </script>
</body>
</html>
