<!DOCTYPE html>
<html>
<head>
  <title>Markspace Icon Generator</title>
  <style>
    body {
      font-family: system-ui;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { color: #60a5fa; }
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    .icon-box {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    canvas {
      border: 1px solid #444;
      border-radius: 4px;
      background: white;
      margin: 10px 0;
    }
    button {
      background: #60a5fa;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }
    button:hover {
      background: #3b82f6;
    }
    #upload {
      display: block;
      margin: 20px 0;
      padding: 15px;
      background: #2a2a2a;
      border: 2px dashed #60a5fa;
      border-radius: 8px;
      cursor: pointer;
    }
    .instructions {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #60a5fa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Markspace Icon Generator</h1>

    <div class="instructions">
      <h3>Instructions:</h3>
      <ol>
        <li>Click "Choose Logo File" and select: <code>../../src/assets/logo_v2 1.png</code></li>
        <li>Icons will auto-generate in all required sizes</li>
        <li>Click "Download" buttons to save each icon</li>
        <li>Replace files in <code>chrome-extension/assets/icons/</code></li>
      </ol>
    </div>

    <input type="file" id="upload" accept="image/*">

    <div class="icon-grid">
      <div class="icon-box">
        <h3>16x16</h3>
        <canvas id="canvas16" width="16" height="16"></canvas>
        <button onclick="downloadIcon('canvas16', 'icon16.png')">Download</button>
      </div>

      <div class="icon-box">
        <h3>32x32</h3>
        <canvas id="canvas32" width="32" height="32"></canvas>
        <button onclick="downloadIcon('canvas32', 'icon32.png')">Download</button>
      </div>

      <div class="icon-box">
        <h3>48x48</h3>
        <canvas id="canvas48" width="48" height="48"></canvas>
        <button onclick="downloadIcon('canvas48', 'icon48.png')">Download</button>
      </div>

      <div class="icon-box">
        <h3>128x128</h3>
        <canvas id="canvas128" width="128" height="128"></canvas>
        <button onclick="downloadIcon('canvas128', 'icon128.png')">Download</button>
      </div>
    </div>

    <button onclick="downloadAll()" style="font-size: 16px; padding: 15px 30px;">
      📦 Download All Icons
    </button>
  </div>

  <script>
    let originalImage = null;

    document.getElementById('upload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          originalImage = img;
          generateAllIcons();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function generateAllIcons() {
      if (!originalImage) return;

      const sizes = [16, 32, 48, 128];
      sizes.forEach(size => {
        const canvas = document.getElementById(`canvas${size}`);
        const ctx = canvas.getContext('2d');

        // Clear canvas
        ctx.clearRect(0, 0, size, size);

        // Draw image scaled to fit
        ctx.drawImage(originalImage, 0, 0, size, size);
      });
    }

    function downloadIcon(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const url = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = filename;
      link.href = url;
      link.click();
    }

    function downloadAll() {
      const sizes = [16, 32, 48, 128];
      sizes.forEach((size, index) => {
        setTimeout(() => {
          downloadIcon(`canvas${size}`, `icon${size}.png`);
        }, index * 500); // Stagger downloads
      });
    }
  </script>
</body>
</html>
