<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Sync Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .status {
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .success { background: #1e3a1e; border-color: #2d5a2d; }
        .error { background: #3a1e1e; border-color: #5a2d2d; }
        .info { background: #1e2a3a; border-color: #2d3d5a; }
        button {
            padding: 12px 24px;
            margin: 5px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #0052a3; }
        pre {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🔧 Extension Sync Test Page</h1>
    <p>This page helps you test if the BookmarkHub extension is working correctly with localhost.</p>

    <div id="status" class="status info">
        <strong>Status:</strong> Waiting for extension...
    </div>

    <div style="margin: 20px 0;">
        <button onclick="checkExtension()">1. Check Extension</button>
        <button onclick="checkStorage()">2. Check Storage</button>
        <button onclick="requestSync()">3. Request Sync</button>
        <button onclick="clearData()">4. Clear Test Data</button>
    </div>

    <h3>Messages Log:</h3>
    <pre id="log"></pre>

    <script>
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            logEl.textContent += `[${timestamp}] ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;

            if (type === 'success') {
                statusEl.className = 'status success';
            } else if (type === 'error') {
                statusEl.className = 'status error';
            } else {
                statusEl.className = 'status info';
            }
            statusEl.innerHTML = `<strong>Status:</strong> ${message}`;
        }

        // Listen for extension messages
        window.addEventListener('message', (event) => {
            if (event.data?.source === 'x-bookmark-manager-extension') {
                log(`📨 Extension message: ${event.data.type}`, 'success');

                if (event.data.type === 'X_EXTENSION_READY') {
                    log('✅ Extension is installed and ready!', 'success');
                }

                if (event.data.type === 'X_BOOKMARKS_UPDATED') {
                    log(`📚 Bookmarks updated! Count: ${event.data.count}, Total: ${event.data.total}`, 'success');
                    log('🔄 Page will reload in 2 seconds...', 'info');
                    setTimeout(() => {
                        window.location.reload();
                    }, 2000);
                }
            }
        });

        function checkExtension() {
            log('🔍 Checking if extension is installed...', 'info');

            const timeout = setTimeout(() => {
                log('❌ Extension not detected (no response within 2 seconds)', 'error');
            }, 2000);

            const handler = (event) => {
                if (event.data?.type === 'X_EXTENSION_READY') {
                    clearTimeout(timeout);
                    window.removeEventListener('message', handler);
                }
            };

            window.addEventListener('message', handler);
            window.postMessage({
                type: 'X_CHECK_EXTENSION',
                source: 'x-bookmark-manager-app'
            }, '*');
        }

        function requestSync() {
            log('📤 Requesting sync from extension...', 'info');
            window.postMessage({
                type: 'X_REQUEST_SYNC',
                source: 'x-bookmark-manager-app'
            }, '*');
            log('✅ Sync request sent. Check if bookmarks update...', 'info');
        }

        function checkStorage() {
            log('💾 Checking localStorage...', 'info');

            const data = localStorage.getItem('x-bookmark-manager-data');
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    log(`✅ Found ${parsed.bookmarks?.length || 0} bookmarks in localStorage`, 'success');
                    log(`   Last import: ${parsed.appState?.lastImportSource || 'unknown'}`, 'info');
                    log(`   Last update: ${parsed.metadata?.lastUpdate || 'unknown'}`, 'info');
                } catch (e) {
                    log(`❌ Error parsing localStorage: ${e.message}`, 'error');
                }
            } else {
                log('⚠️  No data in localStorage', 'error');
            }

            // Check extension storage (if available)
            if (typeof chrome !== 'undefined' && chrome.storage) {
                chrome.storage.local.get(['extractedBookmarks'], (result) => {
                    if (result.extractedBookmarks) {
                        log(`📦 Extension has ${result.extractedBookmarks.length} bookmarks ready to sync`, 'success');
                    } else {
                        log('📦 Extension storage is empty (normal after sync)', 'info');
                    }
                });
            }
        }

        function clearData() {
            localStorage.removeItem('x-bookmark-manager-data');
            log('🗑️  Cleared localStorage data', 'info');
        }

        // Auto-check on load
        setTimeout(() => {
            log('🚀 Page loaded. Extension content script should be running...', 'info');
            checkExtension();
        }, 500);
    </script>
</body>
</html>
