name = "bookmarkhub-share-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# KV Namespace for storing shared collections
[[kv_namespaces]]
binding = "SHARES"
id = "YOUR_KV_NAMESPACE_ID"  # Replace with actual ID after creating namespace

# For local development
# Run: wrangler kv:namespace create SHARES
# Then update the id above

[vars]
CORS_ORIGIN = "https://bookmarkhub.breathworklabs.com"

# Development overrides
[env.dev]
vars = { CORS_ORIGIN = "http://localhost:5173" }

[[env.dev.kv_namespaces]]
binding = "SHARES"
id = "YOUR_DEV_KV_NAMESPACE_ID"  # Replace with preview namespace ID
